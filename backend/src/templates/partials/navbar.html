<!-- Navbar Component -->

<header class="sticky top-0 z-50">

      <!-- Logo -->
      <div class="flex shrink-0 items-center min-w-0">
        <a

          class="flex items-center gap-2 text-2xl lg:text-3xl font-bold text-zinc-100 hover:text-lime-400 transition-colors duration-200"
        >
          <i class="fa-brands fa-rocketchat"></i>
          <span>Cifrar</span>
        </a>
      </div>

      <!-- Links + mobile toggle -->
      <div class="flex items-center gap-6 md:gap-8">

        <div class="hidden md:flex items-center gap-x-8">

            class="flex items-center gap-1.5 text-lg lg:text-xl font-bold text-zinc-300 transition-colors duration-200 hover:text-lime-400"

        <button

          type="button"
          class="md:hidden p-2 text-zinc-300 hover:text-lime-400 transition-colors duration-200 rounded-lg"

      <div class="flex flex-col gap-1">
